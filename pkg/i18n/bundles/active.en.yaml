#
# CONST-046 active bundle — English source-of-truth message strings
# for digital.vasic.llmorchestrator user-facing call sites.
#
# Schema: flat "messageID: value" mapping (yaml.Unmarshal into
# map[string]string by pkg/i18n/bundle.go). The nested "id:\n  other: ..."
# form is NOT supported by the loader (unmarshals into a map, not a string).
#
# Placeholders use {brace} syntax resolved by BundleTranslator.interpolate.
# The brace name MUST match the flat templateData key the call site passes
# (e.g. map[string]any{"version": v} <-> {version}). Go text/template
# "{{.field}}" syntax is NOT supported and would ship literally to the user.
#
# Additional locales: copy this file to active.<lang>.yaml and translate the
# values; keys MUST stay identical.
#
# Merge-conflict resolution (committed-corruption fix, 2026-06-15): the two
# committed conflict sides used incompatible key schemes (HEAD =
# llmorchestrator_*; other = cli.* / config.*) AND incompatible placeholder
# syntaxes ({{.field}} vs {field}) AND incompatible YAML shapes (nested
# "other:" vs flat). Captured evidence determined the live consumers:
#   * cmd/orchestrator/main.go references llmorchestrator_cli_*  (11 keys)
#   * pkg/agent/*_agent.go      references llmorchestrator_agent_* (15 keys)
#   * pkg/config/config.go      references config.*               (6 keys)
#   * the other side's cli.* keys had ZERO live Go consumers (a dead rename).
# Only the flat {brace} form substitutes at runtime (FACT-proven via the
# BundleTranslator loader + interpolate). Resolution: keep every
# live-referenced key, in flat {brace} form (HEAD's {{.field}} converted to
# {field}); drop the dead cli.* block. No translation referenced by a live
# consumer is lost.

# --- Standalone orchestrator CLI (cmd/orchestrator/main.go) -------------
# Field names match the flat templateData keys main.go passes
# (version / error / agent / name / id / count).
llmorchestrator_cli_version_banner: "LLMOrchestrator v{version}\n"
llmorchestrator_cli_config_load_error: "Error loading config: {error}\n"
llmorchestrator_cli_config_invalid: "Invalid config: {error}\n"
llmorchestrator_cli_agent_skipped: "Warning: skipping agent {agent}: {error}\n"
llmorchestrator_cli_agent_unknown: "Unknown agent: {agent}\n"
llmorchestrator_cli_agent_register_error: "Error registering agent {agent}: {error}\n"
llmorchestrator_cli_agent_registered: "Registered agent: {name} ({id})\n"
llmorchestrator_cli_ready_banner: "LLMOrchestrator v{version} ready with {count} agents\n"
llmorchestrator_cli_shutting_down: "\nShutting down..."
llmorchestrator_cli_shutdown_error: "Shutdown error: {error}\n"
llmorchestrator_cli_shutdown_complete: "Shutdown complete."

# --- Per-builder agent invocationError.Error() (pkg/agent/*_agent.go) ---
# Three branches per builder. Field names match the flat templateData keys
# the agent call sites pass (sentinel / op / exitCode / stderr / wrapped).

# with-stderr branch
llmorchestrator_agent_opencode_invocation_failed_with_stderr: "{sentinel}: {op} exit {exitCode}: {stderr}"
llmorchestrator_agent_claudecode_invocation_failed_with_stderr: "{sentinel}: {op} exit {exitCode}: {stderr}"
llmorchestrator_agent_gemini_invocation_failed_with_stderr: "{sentinel}: {op} exit {exitCode}: {stderr}"
llmorchestrator_agent_junie_invocation_failed_with_stderr: "{sentinel}: {op} exit {exitCode}: {stderr}"
llmorchestrator_agent_qwencode_invocation_failed_with_stderr: "{sentinel}: {op} exit {exitCode}: {stderr}"

# exit-code-only branch (no stderr captured)
llmorchestrator_agent_opencode_invocation_failed_exit_code_only: "{sentinel}: {op} exit {exitCode}"
llmorchestrator_agent_claudecode_invocation_failed_exit_code_only: "{sentinel}: {op} exit {exitCode}"
llmorchestrator_agent_gemini_invocation_failed_exit_code_only: "{sentinel}: {op} exit {exitCode}"
llmorchestrator_agent_junie_invocation_failed_exit_code_only: "{sentinel}: {op} exit {exitCode}"
llmorchestrator_agent_qwencode_invocation_failed_exit_code_only: "{sentinel}: {op} exit {exitCode}"

# wrapped-error branch (non-exit failure; e.g. context cancel)
llmorchestrator_agent_opencode_invocation_failed_wrapped: "{sentinel}: {op}: {wrapped}"
llmorchestrator_agent_claudecode_invocation_failed_wrapped: "{sentinel}: {op}: {wrapped}"
llmorchestrator_agent_gemini_invocation_failed_wrapped: "{sentinel}: {op}: {wrapped}"
llmorchestrator_agent_junie_invocation_failed_wrapped: "{sentinel}: {op}: {wrapped}"
llmorchestrator_agent_qwencode_invocation_failed_wrapped: "{sentinel}: {op}: {wrapped}"

# --- Configuration validation (pkg/config/config.go) -------------------
# config.no_path_for_agent passes {agent}; config.agent_binary_not_found
# passes {path}; the rest are placeholder-free.
config.no_path_for_agent: "no path configured for agent: {agent}"
config.agent_binary_not_found: "agent binary not found: {path}"
config.timeout_must_be_positive: "agent timeout must be positive"
config.max_retries_non_negative: "max retries must be non-negative"
config.pool_size_must_be_positive: "pool size must be positive"
config.at_least_one_agent: "at least one agent must be enabled"
